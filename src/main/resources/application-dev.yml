# Development Configuration
# Use this profile to enable debug logging and H2 console

spring:
  profiles:
    active: dev

  application:
    name: timesheet-management-system

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  datasource:
    url: jdbc:h2:mem:timesheetdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidationPurposesOnlyDoNotShareThis
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    root: INFO
    com.timesheet.management: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
